name: Publish to crates.io

on:
  push:
    tags:
      - '*-v[0-9]+.[0-9]+.[0-9]+*'   # e.g., crate-a-v1.2.3
  workflow_dispatch:
    inputs:
      crate:
        description: 'Crate to publish (name or "all")'
        required: true
        type: string
      dry_run:
        description: 'Perform dry-run only'
        required: false
        default: true
        type: boolean

jobs:
  # verify-tag-on-main:
  #   runs-on: ubuntu-latest
  #   if: github.ref_type == 'tag'
  #   outputs:
  #     is_valid: ${{ steps.check.outputs.is_valid }}
  #   steps:
  #     # Pinned actions/checkout@v6.0.2
  #     - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
  #       with:
  #         fetch-depth: 0

  #     - name: Verify tag points to a commit on main
  #       id: check
  #       run: |
  #         TAG="${GITHUB_REF#refs/tags/}"
  #         echo "Checking tag: $TAG"

  #         # Find branches containing this commit
  #         BRANCHES=$(git branch --contains "${GITHUB_SHA}" --format='%(refname:short)')

  #         if echo "$BRANCHES" | grep -q '^main$'; then
  #           echo "✅ Tag $TAG is on main branch"
  #           echo "is_valid=true" >> $GITHUB_OUTPUT
  #         else
  #           echo "❌ Tag $TAG is NOT on main (found on: $BRANCHES)"
  #           echo "is_valid=false" >> $GITHUB_OUTPUT
  #           exit 1
  #         fi

  publish:
    # needs: verify-tag-on-main
    # TODO uncomment
    # if: needs.verify-tag-on-main.outputs.is_valid == 'true'
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
      contents: read
    steps:
      # Pinned actions/checkout@v6.0.2
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # Pinned dtolnay/rust-toolchain@1.94.1
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable

      # Pinned actions/cache@v5.0.5
      - name: Cache cargo tools
        id: cache-tools
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: ~/.cargo/bin
          key: cargo-tools-ws-0.4.2-audit-0.22.1-deny-0.19.6-${{ runner.os }}

      - name: Install tools
        if: steps.cache-tools.outputs.cache-hit != 'true'
        run: |
          cargo install cargo-workspaces --version 0.4.2
          cargo install cargo-audit --version 0.22.1
          cargo install cargo-deny --version 0.19.6

      - name: Audit
        run: cargo audit
      
      - name: Deny
        run: cargo deny check licenses

      - name: Trusted Publishing
        # Pinned rust-lang/crates-io-auth-action@1.0.4
        uses: rust-lang/crates-io-auth-action@bbd81622f20ce9e2dd9622e3218b975523e45bbe
        id: auth

      - name: Publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          CRATE="${{ inputs.crate || 'auto' }}"
          DRY="${{ inputs.dry_run == 'true' && '--dry-run' || '' }}"

          if [ "$CRATE" = "all" ]; then
            cargo workspaces publish --from-git $DRY --publish-interval 20 --yes
          else
            cargo publish -p "$CRATE" $DRY
          fi